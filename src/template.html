<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoList</title>
</head>
<body>
    <header>
        <h1 class="title">TODOLIST</h1>
        <div class="menuContainer">
            <div class="menu">
                <button class="new newTodo">New Todo</button>
                <button class="new newProject">New Project</button>
            </div>
            <button class="createButton">+</button>
        </div>
    </header>
    <div class="todoFormContainer">
        <form class="todoForm">
            <p>New Todo</p>
            <label for="title">Title</label>
            <input type="text" name="title" class="todoTitle" placeholder="Title">
            <label for="description">Description</label>
            <input type="text" name="description" class="todoDesc" placeholder="Description">
            <label for="due">Due</label>
            <input type="datetime-local" name="due" class="todoDate">
            <label for="priority">Priority:</label>
            <select name="priority">
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>
            <input class="submitButton" type="submit" value="CREATE">
        </form>
    </div>
</body>
</html>
